name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify release version
        run: |
          ./scripts/check-version.sh
          test "$GITHUB_REF_NAME" = "v$(cat VERSION)"

      - name: Verify modules
        run: go mod verify

      - name: Test and vet
        run: |
          go test -race ./...
          go vet ./...

      - name: Scan reachable vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Run static security analysis
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -exclude-generated ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -eu
          tag="$GITHUB_REF_NAME"
          asset="ms-teams-tui-$tag-$GOOS-$GOARCH"
          mkdir -p dist package
          if [ "$GOOS" = "windows" ]; then
            go build -trimpath -ldflags="-s -w -X main.version=$tag" -o package/teams.exe .
            (cd package && zip -q "../dist/$asset.zip" teams.exe)
          else
            go build -trimpath -ldflags="-s -w -X main.version=$tag" -o package/teams .
            tar -C package -czf "dist/$asset.tar.gz" teams
          fi

      - name: Upload release archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ms-teams-tui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum ms-teams-tui-* > checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "ms-teams-tui $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag \
            --latest
