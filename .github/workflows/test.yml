name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Scan reachable vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Run static security analysis
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -exclude-generated ./...

      - name: Build and verify version
        run: |
          make build
          test "$(./bin/teams --version)" = "ms-teams-tui v$(cat VERSION)"
